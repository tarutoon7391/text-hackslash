<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テキスト ハクスラ RPG</title>
  <style>
    /* ===== ターミナル風レトロデザイン ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0a0a;
      color: #00ff41;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ff41;
      margin-bottom: 20px;
      text-align: center;
    }

    /* ===== ゲーム全体のコンテナ ===== */
    #game-container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ===== ステータスパネル（プレイヤー + 敵） ===== */
    #status-panel {
      display: flex;
      gap: 12px;
    }

    .status-box {
      flex: 1;
      border: 1px solid #00ff41;
      padding: 12px;
      box-shadow: 0 0 8px #00ff4166;
    }

    .status-box h2 {
      font-size: 1rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 0 0 6px #00ff41;
    }

    .status-name {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .hp-label {
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    /* ===== HP バー ===== */
    .hp-bar-outer {
      width: 100%;
      height: 14px;
      background-color: #111;
      border: 1px solid #00ff41;
      margin-bottom: 8px;
    }

    .hp-bar-inner {
      height: 100%;
      background-color: #00ff41;
      transition: width 0.4s ease;
    }

    /* HP が低いときに警告色にする */
    .hp-bar-inner.danger {
      background-color: #ff4444;
      box-shadow: 0 0 6px #ff4444;
    }

    .hp-bar-inner.warning {
      background-color: #ffaa00;
    }

    .status-detail {
      font-size: 0.8rem;
      color: #00cc33;
    }

    /* ===== バトルログ ===== */
    #log-area {
      border: 1px solid #00ff41;
      background-color: #050505;
      padding: 10px;
      height: 220px;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.6;
      box-shadow: inset 0 0 10px #00ff4122;
    }

    /* ログの各行 */
    .log-line {
      margin: 2px 0;
      white-space: pre-wrap;
    }

    .log-line.player-action  { color: #00ff41; }
    .log-line.enemy-action   { color: #ff6666; }
    .log-line.system         { color: #aaaaaa; }
    .log-line.special        { color: #ffdd00; text-shadow: 0 0 4px #ffdd00; }
    .log-line.result         { color: #00ccff; }

    /* ===== アクションボタンエリア ===== */
    #action-panel {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .action-btn {
      background-color: #0a0a0a;
      color: #00ff41;
      border: 1px solid #00ff41;
      padding: 10px 24px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background-color 0.15s, box-shadow 0.15s;
    }

    .action-btn:hover:not(:disabled) {
      background-color: #00ff4122;
      box-shadow: 0 0 10px #00ff41;
    }

    .action-btn:disabled {
      color: #336633;
      border-color: #336633;
      cursor: not-allowed;
    }

    /* ===== 次の戦闘・リセットボタン ===== */
    #next-btn {
      display: none;
      background-color: #0a0a0a;
      color: #ffdd00;
      border: 1px solid #ffdd00;
      padding: 10px 28px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      letter-spacing: 2px;
      cursor: pointer;
      margin: 0 auto;
      transition: background-color 0.15s, box-shadow 0.15s;
    }

    #next-btn:hover {
      background-color: #ffdd0022;
      box-shadow: 0 0 10px #ffdd00;
    }

    /* ===== フッター ===== */
    footer {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #336633;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<h1>⚔ TEXT HACK&amp;SLASH ⚔</h1>

<div id="game-container">

  <!-- ステータス表示パネル（プレイヤー・敵） -->
  <div id="status-panel">

    <!-- プレイヤーステータス -->
    <div class="status-box" id="player-box">
      <h2>[ PLAYER ]</h2>
      <div class="status-name" id="player-name">—</div>
      <div class="hp-label" id="player-hp-label">HP: — / —</div>
      <div class="hp-bar-outer">
        <div class="hp-bar-inner" id="player-hp-bar" style="width:100%"></div>
      </div>
      <div class="status-detail" id="player-detail">ATK: — / DEF: — / LV: —</div>
    </div>

    <!-- 敵ステータス -->
    <div class="status-box" id="enemy-box">
      <h2>[ ENEMY ]</h2>
      <div class="status-name" id="enemy-name">—</div>
      <div class="hp-label" id="enemy-hp-label">HP: — / —</div>
      <div class="hp-bar-outer">
        <div class="hp-bar-inner" id="enemy-hp-bar" style="width:100%"></div>
      </div>
      <div class="status-detail" id="enemy-detail">ATK: — / DEF: — / EXP: —</div>
    </div>

  </div>

  <!-- バトルログエリア -->
  <div id="log-area"></div>

  <!-- アクションボタン -->
  <div id="action-panel">
    <button class="action-btn" id="btn-attack"  onclick="playerAction('attack')">⚔ 攻撃</button>
    <button class="action-btn" id="btn-skill"   onclick="playerAction('skill')">✨ スキル</button>
    <button class="action-btn" id="btn-flee"    onclick="playerAction('flee')">🚪 逃げる</button>
  </div>

  <!-- 次の戦闘 / ゲームオーバー後のリセットボタン -->
  <button id="next-btn" onclick="nextBattle()">▶ 次の戦闘へ</button>

</div>

<footer>HACK &amp; SLASH TEXT RPG — VANILLA JS EDITION</footer>

<script>
'use strict';

/* ==============================================================
   ゲームバランス定数
   数値を変えるだけでバランス調整が簡単にできる
   ============================================================== */

/** 防御力の軽減係数（通常攻撃） */
const DEFENSE_FACTOR       = 0.5;
/** スキル攻撃倍率 */
const SKILL_MULTIPLIER     = 1.8;
/** スキル攻撃時の防御軽減係数（通常より低い） */
const SKILL_DEFENSE_FACTOR = 0.4;
/** 逃げる成功率（0.0 〜 1.0） */
const FLEE_SUCCESS_RATE    = 0.5;
/** 敵ターン開始までの遅延（ミリ秒） */
const ENEMY_TURN_DELAY_MS  = 700;
/** ログセパレーター行の文字数 */
const LOG_SEPARATOR_LENGTH = 40;

/** プレイヤーの初期ステータス（バランス調整はここで行う） */
const INITIAL_PLAYER_STATS = {
  name:    '勇者',
  hp:      100,
  maxHp:   100,
  attack:  18,
  defense: 8,
  level:   1,
};

/* ==============================================================
   ユーティリティ関数
   ============================================================== */

/** min 以上 max 以下の整数乱数を返す */
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/** 配列からランダムに 1 要素を返す */
function pick(arr) {
  return arr[randInt(0, arr.length - 1)];
}

/* ==============================================================
   プレイヤークラス
   ============================================================== */
class Player {
  /**
   * @param {string} name    - キャラクター名
   * @param {number} hp      - 現在 HP
   * @param {number} maxHp   - 最大 HP
   * @param {number} attack  - 攻撃力
   * @param {number} defense - 防御力
   * @param {number} level   - レベル
   */
  constructor(name, hp, maxHp, attack, defense, level) {
    this.name    = name;
    this.hp      = hp;
    this.maxHp   = maxHp;
    this.attack  = attack;
    this.defense = defense;
    this.level   = level;
    this.exp     = 0;      // 経験値（将来の育成機能用）
  }

  /** 通常攻撃ダメージを計算して返す */
  calcAttackDamage(target) {
    // 攻撃力からターゲットの防御力を引き、最低 1 ダメージを保証する
    const raw = this.attack - Math.floor(target.defense * DEFENSE_FACTOR);
    return Math.max(1, raw + randInt(-2, 2));
  }

  /**
   * スキル攻撃ダメージを計算して返す
   * 通常攻撃の SKILL_MULTIPLIER 倍の威力（将来的にMPコストなど追加予定）
   */
  calcSkillDamage(target) {
    const raw = Math.floor(this.attack * SKILL_MULTIPLIER) - Math.floor(target.defense * SKILL_DEFENSE_FACTOR);
    return Math.max(1, raw + randInt(-1, 3));
  }

  /** 生存確認 */
  isAlive() {
    return this.hp > 0;
  }

  /** ダメージを受ける */
  takeDamage(amount) {
    this.hp = Math.max(0, this.hp - amount);
  }

  /** HP を回復する（maxHp を超えない） */
  heal(amount) {
    this.hp = Math.min(this.maxHp, this.hp + amount);
  }
}

/* ==============================================================
   敵クラス
   ============================================================== */
class Enemy {
  /**
   * @param {string} name       - 敵の名前
   * @param {number} hp         - 現在 HP
   * @param {number} maxHp      - 最大 HP
   * @param {number} attack     - 攻撃力
   * @param {number} defense    - 防御力
   * @param {number} expReward  - 撃破時の獲得経験値
   */
  constructor(name, hp, maxHp, attack, defense, expReward) {
    this.name      = name;
    this.hp        = hp;
    this.maxHp     = maxHp;
    this.attack    = attack;
    this.defense   = defense;
    this.expReward = expReward;
  }

  /** 通常攻撃ダメージを計算して返す */
  calcAttackDamage(target) {
    const raw = this.attack - Math.floor(target.defense * DEFENSE_FACTOR);
    return Math.max(1, raw + randInt(-2, 2));
  }

  /** 生存確認 */
  isAlive() {
    return this.hp > 0;
  }

  /** ダメージを受ける */
  takeDamage(amount) {
    this.hp = Math.max(0, this.hp - amount);
  }
}

/* ==============================================================
   敵データテーブル
   敵を追加するにはこの配列にオブジェクトを追加するだけでよい
   ============================================================== */
const ENEMY_TABLE = [
  { name: 'スライム',       hp: 20,  maxHp: 20,  attack: 6,  defense: 2,  expReward: 10 },
  { name: 'ゴブリン',       hp: 30,  maxHp: 30,  attack: 9,  defense: 4,  expReward: 18 },
  { name: 'コウモリ',       hp: 18,  maxHp: 18,  attack: 8,  defense: 1,  expReward: 12 },
  { name: 'スケルトン',     hp: 35,  maxHp: 35,  attack: 11, defense: 6,  expReward: 25 },
  { name: 'オーク',         hp: 50,  maxHp: 50,  attack: 14, defense: 8,  expReward: 35 },
  { name: 'ダークウィザード', hp: 28, maxHp: 28,  attack: 18, defense: 3,  expReward: 40 },
  { name: 'ドラゴン',       hp: 80,  maxHp: 80,  attack: 22, defense: 12, expReward: 80 },
];

/* ==============================================================
   ゲーム状態管理
   ============================================================== */
const GameState = {
  PLAYER_TURN: 'player_turn', // プレイヤーのターン
  ENEMY_TURN:  'enemy_turn',  // 敵のターン
  BATTLE_END:  'battle_end',  // 戦闘終了
};

/** ゲーム全体の状態を保持するオブジェクト */
let game = {
  player:       null,  // Player インスタンス
  enemy:        null,  // Enemy インスタンス
  state:        null,  // GameState の値
  battleCount:  0,     // 連戦カウンター
};

/* ==============================================================
   UI 更新関数
   ============================================================== */

/** HP バーと HP ラベルを更新する */
function updateHpBar(barId, labelId, current, max) {
  const bar   = document.getElementById(barId);
  const label = document.getElementById(labelId);
  const pct   = Math.max(0, Math.min(100, (current / max) * 100));

  bar.style.width = pct + '%';
  label.textContent = `HP: ${current} / ${max}`;

  // HP 残量に応じて色を変える
  bar.classList.remove('danger', 'warning');
  if (pct <= 25) {
    bar.classList.add('danger');
  } else if (pct <= 50) {
    bar.classList.add('warning');
  }
}

/** プレイヤーステータス全体を更新する */
function renderPlayerStatus() {
  const p = game.player;
  document.getElementById('player-name').textContent   = p.name;
  document.getElementById('player-detail').textContent =
    `ATK: ${p.attack}  DEF: ${p.defense}  LV: ${p.level}  EXP: ${p.exp}`;
  updateHpBar('player-hp-bar', 'player-hp-label', p.hp, p.maxHp);
}

/** 敵ステータス全体を更新する */
function renderEnemyStatus() {
  const e = game.enemy;
  document.getElementById('enemy-name').textContent   = e.name;
  document.getElementById('enemy-detail').textContent =
    `ATK: ${e.attack}  DEF: ${e.defense}  EXP報酬: ${e.expReward}`;
  updateHpBar('enemy-hp-bar', 'enemy-hp-label', e.hp, e.maxHp);
}

/** アクションボタンの有効 / 無効を切り替える */
function setButtonsEnabled(enabled) {
  ['btn-attack', 'btn-skill', 'btn-flee'].forEach(id => {
    document.getElementById(id).disabled = !enabled;
  });
}

/** 「次の戦闘へ」ボタンの表示 / 非表示を切り替える */
function showNextBtn(show, label) {
  const btn = document.getElementById('next-btn');
  btn.style.display = show ? 'block' : 'none';
  if (label) btn.textContent = label;
}

/* ==============================================================
   ログ出力関数
   ============================================================== */

/**
 * バトルログにメッセージを追加する
 * @param {string} text      - 表示テキスト
 * @param {string} cssClass  - log-line に付与するクラス名
 */
function log(text, cssClass = 'system') {
  const area = document.getElementById('log-area');
  const line = document.createElement('div');
  line.className = `log-line ${cssClass}`;
  line.textContent = text;
  area.appendChild(line);
  // 常に最新行が見えるようにスクロール
  area.scrollTop = area.scrollHeight;
}

/** ログエリアを空にする */
function clearLog() {
  document.getElementById('log-area').innerHTML = '';
}

/* ==============================================================
   戦闘ロジック
   ============================================================== */

/** 新しい敵をランダムに生成して返す（テーブルからコピー） */
function spawnEnemy() {
  const template = pick(ENEMY_TABLE);
  // テーブルの値を使って新しい Enemy インスタンスを作成
  return new Enemy(
    template.name,
    template.hp,
    template.maxHp,
    template.attack,
    template.defense,
    template.expReward
  );
}

/**
 * プレイヤーのアクションを処理する
 * @param {string} action - 'attack' | 'skill' | 'flee'
 */
function playerAction(action) {
  // プレイヤーのターン以外は受け付けない
  if (game.state !== GameState.PLAYER_TURN) return;

  // アクション中はボタンを無効化
  setButtonsEnabled(false);

  switch (action) {
    case 'attack':
      doPlayerAttack();
      break;
    case 'skill':
      doPlayerSkill();
      break;
    case 'flee':
      doPlayerFlee();
      break;
    default:
      break;
  }
}

/** 通常攻撃処理 */
function doPlayerAttack() {
  const dmg = game.player.calcAttackDamage(game.enemy);
  game.enemy.takeDamage(dmg);
  log(`▶ ${game.player.name} の攻撃！ → ${game.enemy.name} に ${dmg} ダメージ！`, 'player-action');
  renderEnemyStatus();
  afterPlayerTurn();
}

/** スキル攻撃処理 */
function doPlayerSkill() {
  const dmg = game.player.calcSkillDamage(game.enemy);
  game.enemy.takeDamage(dmg);
  log(`✨ ${game.player.name} のスキル【烈火斬】！ → ${game.enemy.name} に ${dmg} ダメージ！`, 'special');
  renderEnemyStatus();
  afterPlayerTurn();
}

/** 逃げる処理（FLEE_SUCCESS_RATE の確率で成功） */
function doPlayerFlee() {
  const success = Math.random() < FLEE_SUCCESS_RATE;
  if (success) {
    log(`🚪 ${game.player.name} は逃げ出した！`, 'result');
    endBattle('fled');
  } else {
    log(`${game.player.name} は逃げようとしたが、失敗した！`, 'system');
    afterPlayerTurn();
  }
}

/** プレイヤーのターン終了後の処理 */
function afterPlayerTurn() {
  // 敵の HP チェック
  if (!game.enemy.isAlive()) {
    endBattle('win');
    return;
  }
  // 敵のターンへ移行（少し遅延して自然な演出を出す）
  game.state = GameState.ENEMY_TURN;
  setTimeout(doEnemyTurn, ENEMY_TURN_DELAY_MS);
}

/** 敵のターン処理（現在はランダム攻撃のみ） */
function doEnemyTurn() {
  if (game.state !== GameState.ENEMY_TURN) return;

  const dmg = game.enemy.calcAttackDamage(game.player);
  game.player.takeDamage(dmg);
  log(`◀ ${game.enemy.name} の攻撃！ → ${game.player.name} に ${dmg} ダメージ！`, 'enemy-action');
  renderPlayerStatus();

  // プレイヤーの HP チェック
  if (!game.player.isAlive()) {
    endBattle('lose');
    return;
  }

  // プレイヤーのターンへ戻す
  game.state = GameState.PLAYER_TURN;
  log('─'.repeat(LOG_SEPARATOR_LENGTH), 'system');
  log('あなたのターンです。アクションを選んでください。', 'system');
  setButtonsEnabled(true);
}

/**
 * 戦闘終了処理
 * @param {string} result - 'win' | 'lose' | 'fled'
 */
function endBattle(result) {
  game.state = GameState.BATTLE_END;
  setButtonsEnabled(false);

  if (result === 'win') {
    const exp = game.enemy.expReward;
    game.player.exp += exp;
    log('═'.repeat(LOG_SEPARATOR_LENGTH), 'special');
    log(`🏆 ${game.enemy.name} を倒した！ EXP +${exp}`, 'result');
    log(`累計 EXP: ${game.player.exp}`, 'result');
    log('═'.repeat(LOG_SEPARATOR_LENGTH), 'special');
    renderPlayerStatus();
    showNextBtn(true, '▶ 次の戦闘へ');
  } else if (result === 'lose') {
    log('═'.repeat(LOG_SEPARATOR_LENGTH), 'enemy-action');
    log(`☠ ${game.player.name} は倒れた… GAME OVER`, 'enemy-action');
    log('═'.repeat(LOG_SEPARATOR_LENGTH), 'enemy-action');
    showNextBtn(true, '🔄 最初からやり直す');
  } else if (result === 'fled') {
    showNextBtn(true, '▶ 次の戦闘へ');
  }
}

/* ==============================================================
   戦闘開始 / 次の戦闘 / リセット
   ============================================================== */

/** 新しい戦闘を開始する */
function startBattle() {
  // ゲームオーバー後のリセット判定
  if (game.player && !game.player.isAlive()) {
    initGame();
    return;
  }

  game.battleCount++;
  game.enemy = spawnEnemy();
  game.state = GameState.PLAYER_TURN;

  clearLog();
  log(`=== 戦闘 ${game.battleCount} 開始 ===`, 'special');
  log(`${game.enemy.name} が現れた！`, 'system');
  log('─'.repeat(LOG_SEPARATOR_LENGTH), 'system');
  log('あなたのターンです。アクションを選んでください。', 'system');

  renderPlayerStatus();
  renderEnemyStatus();
  setButtonsEnabled(true);
  showNextBtn(false);
}

/** 「次の戦闘へ」または「やり直す」ボタン押下時の処理 */
function nextBattle() {
  // ゲームオーバー後はプレイヤーを再初期化する
  if (game.player && !game.player.isAlive()) {
    initGame();
  } else {
    startBattle();
  }
}

/** ゲームを初期状態に戻す */
function initGame() {
  // プレイヤーを初期ステータスで作成（INITIAL_PLAYER_STATS で一元管理）
  const s      = INITIAL_PLAYER_STATS;
  game.player  = new Player(s.name, s.hp, s.maxHp, s.attack, s.defense, s.level);
  game.enemy       = null;
  game.state       = null;
  game.battleCount = 0;

  clearLog();
  log('★ テキスト ハクスラ RPG へようこそ！', 'special');
  log('「次の戦闘へ」ボタンを押して最初の戦闘を始めましょう。', 'system');

  renderPlayerStatus();

  // 敵ステータスは空白にする
  document.getElementById('enemy-name').textContent   = '???';
  document.getElementById('enemy-hp-label').textContent = 'HP: — / —';
  document.getElementById('enemy-hp-bar').style.width  = '0%';
  document.getElementById('enemy-detail').textContent  = '— / — / —';

  setButtonsEnabled(false);
  showNextBtn(true, '▶ 最初の戦闘を開始');
}

/* ==============================================================
   ゲーム起動
   ============================================================== */
initGame();
</script>

</body>
</html>
